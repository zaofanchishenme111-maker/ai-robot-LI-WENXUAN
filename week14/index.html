<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>turtlesim 遥控器</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }
    .panel {
      width: min(420px, 100%);
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
    }
    h1 { margin: 0 0 12px; font-size: 22px; }
    p { color: #cbd5e1; line-height: 1.5; }
    .status {
      margin: 14px 0;
      padding: 10px 12px;
      border-radius: 8px;
      background: #020617;
      font-size: 14px;
    }
    .status.connected { color: #86efac; }
    .status.disconnected { color: #fca5a5; }
    .pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 18px 0;
    }
    button {
      min-height: 72px;
      border: none;
      border-radius: 10px;
      font-size: 22px;
      font-weight: bold;
      background: #0ea5e9;
      color: white;
      touch-action: manipulation;
    }
    button.danger { background: #dc2626; }
    .telemetry {
      font-family: Consolas, monospace;
      background: #020617;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .map-card {
      margin-top: 14px;
      background: #020617;
      border-radius: 10px;
      padding: 12px;
    }
    .map-card h2 { margin: 0 0 10px; font-size: 16px; }
    canvas {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      background: #e2e8f0;
      display: block;
    }
    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .button-row button {
      flex: 1;
      min-height: 52px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>turtlesim 手机遥控器</h1>
    <p>长按方向键控制乌龟。如果乌龟卡在墙里乱转，按任意方向键或“重置”即可接管控制。</p>
    <div id="status" class="status disconnected">未连接</div>

    <div class="pad">
      <div></div>
      <button data-linear="2.0" data-angular="0.0">↑</button>
      <div></div>
      <button data-linear="0.0" data-angular="2.0">←</button>
      <button id="stop" class="danger">■</button>
      <button data-linear="0.0" data-angular="-2.0">→</button>
      <div></div>
      <button data-linear="-2.0" data-angular="0.0">↓</button>
      <div></div>
    </div>

    <div class="button-row">
      <button id="reset">重置到起点</button>
      <button id="autoToggle" style="background: #10b981;">开启自动寻路</button>
    </div>

    <div class="map-card">
      <h2>二维迷宫预览</h2>
      <canvas id="mazeCanvas" width="360" height="360"></canvas>
    </div>

    <div id="telemetry" class="telemetry">等待乌龟状态...</div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const telemetryEl = document.getElementById("telemetry");
    const mazeCanvas = document.getElementById("mazeCanvas");
    const mazeCtx = mazeCanvas.getContext("2d");
    const autoToggleBtn = document.getElementById("autoToggle");
    
    const wsScheme = location.protocol === "https:" ? "wss" : "ws";
    const socket = new WebSocket(`${wsScheme}://${location.host}/ws`);
    let latestState = null;
    let isAuto = false;

    socket.onopen = () => {
      statusEl.textContent = "已连接";
      statusEl.className = "status connected";
    };

    socket.onclose = () => {
      statusEl.textContent = "连接断开";
      statusEl.className = "status disconnected";
    };

    socket.onmessage = (event) => {
      const payload = JSON.parse(event.data);
      if (payload.type !== "state") return;
      const state = payload.data;
      latestState = state;
      
      if (state.rule && typeof state.rule.auto !== 'undefined') {
        isAuto = state.rule.auto;
        autoToggleBtn.textContent = isAuto ? "关闭自动寻路" : "开启自动寻路";
        autoToggleBtn.style.background = isAuto ? "#dc2626" : "#10b981";
      }

      telemetryEl.textContent =
        `x: ${state.pose.x}\n` +
        `y: ${state.pose.y}\n` +
        `theta: ${state.pose.theta}\n` +
        `mode: ${isAuto ? "自动寻路" : "手动控制"}\n` +
        `linear: ${state.command.linear}\n` +
        `angular: ${state.command.angular}\n` +
        `applied linear: ${state.applied_command.linear}\n` +
        `applied angular: ${state.applied_command.angular}\n` +
        `blocked: ${state.rule.blocked}\n` +
        `reason: ${state.rule.reason}\n` +
        `goal reached: ${state.rule.goal_reached}`;
      drawMaze(state);
    };

    function sendCommand(linear, angular) {
      if (socket.readyState !== WebSocket.OPEN) return;
      // 核心改动：只要按下按键控制，立刻通过发送指令强行让后端退出自动模式
      socket.send(JSON.stringify({ type: "command", linear, angular }));
    }

    function stopTurtle() {
      if (socket.readyState !== WebSocket.OPEN) return;
      socket.send(JSON.stringify({ type: "stop" }));
    }

    function resetMaze() {
      if (socket.readyState !== WebSocket.OPEN) return;
      socket.send(JSON.stringify({ type: "reset" }));
    }

    function toggleAuto() {
      if (socket.readyState !== WebSocket.OPEN) return;
      socket.send(JSON.stringify({ type: "toggle_auto", auto: !isAuto }));
    }

    function bindHold(button) {
      const linear = Number(button.dataset.linear);
      const angular = Number(button.dataset.angular);
      const start = (event) => { event.preventDefault(); sendCommand(linear, angular); };
      const stop = (event) => { event.preventDefault(); stopTurtle(); };
      button.addEventListener("mousedown", start);
      button.addEventListener("mouseup", stop);
      button.addEventListener("mouseleave", stop);
      button.addEventListener("touchstart", start, { passive: false });
      button.addEventListener("touchend", stop, { passive: false });
      button.addEventListener("touchcancel", stop, { passive: false });
    }

    function worldToCanvasX(x, bounds) {
      const usableWidth = mazeCanvas.width - 40;
      return 20 + ((x - bounds.min_x) / (bounds.max_x - bounds.min_x)) * usableWidth;
    }

    function worldToCanvasY(y, bounds) {
      const usableHeight = mazeCanvas.height - 40;
      return mazeCanvas.height - 20 - ((y - bounds.min_y) / (bounds.max_y - bounds.min_y)) * usableHeight;
    }

    function drawMaze(state) {
      const bounds = state.maze.bounds;
      mazeCtx.clearRect(0, 0, mazeCanvas.width, mazeCanvas.height);

      mazeCtx.fillStyle = "#f8fafc";
      mazeCtx.fillRect(0, 0, mazeCanvas.width, mazeCanvas.height);

      const x0 = worldToCanvasX(bounds.min_x, bounds);
      const x1 = worldToCanvasX(bounds.max_x, bounds);
      const y0 = worldToCanvasY(bounds.max_y, bounds);
      const y1 = worldToCanvasY(bounds.min_y, bounds);

      mazeCtx.strokeStyle = "#0f172a";
      mazeCtx.lineWidth = 3;
      mazeCtx.strokeRect(x0, y0, x1 - x0, y1 - y0);

      mazeCtx.fillStyle = "#475569";
      state.maze.obstacles.forEach((obstacle) => {
        const ox = worldToCanvasX(obstacle.x, bounds);
        const oy = worldToCanvasY(obstacle.y + obstacle.h, bounds);
        const ow = worldToCanvasX(obstacle.x + obstacle.w, bounds) - ox;
        const oh = worldToCanvasY(obstacle.y, bounds) - oy;
        mazeCtx.fillRect(ox, oy, ow, oh);
      });

      const start = state.maze.start;
      mazeCtx.fillStyle = "#16a34a";
      mazeCtx.beginPath();
      mazeCtx.arc(worldToCanvasX(start.x, bounds), worldToCanvasY(start.y, bounds), 8, 0, Math.PI * 2);
      mazeCtx.fill();

      const goal = state.maze.goal;
      mazeCtx.fillStyle = "#f59e0b";
      mazeCtx.beginPath();
      mazeCtx.arc(worldToCanvasX(goal.x, bounds), worldToCanvasY(goal.y, bounds), goal.radius * 20, 0, Math.PI * 2);
      mazeCtx.fill();

      const turtleX = worldToCanvasX(state.pose.x, bounds);
      const turtleY = worldToCanvasY(state.pose.y, bounds);
      mazeCtx.fillStyle = state.rule.blocked ? "#dc2626" : "#2563eb";
      mazeCtx.beginPath();
      mazeCtx.arc(turtleX, turtleY, state.maze.turtle_radius * 18, 0, Math.PI * 2);
      mazeCtx.fill();

      mazeCtx.strokeStyle = "#0f172a";
      mazeCtx.lineWidth = 3;
      mazeCtx.beginPath();
      mazeCtx.moveTo(turtleX, turtleY);
      mazeCtx.lineTo(turtleX + Math.cos(state.pose.theta) * 22, turtleY - Math.sin(state.pose.theta) * 22);
      mazeCtx.stroke();
    }

    document.querySelectorAll("[data-linear]").forEach(bindHold);
    document.getElementById("stop").addEventListener("click", () => {
      if (socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({ type: "stop" }));
      }
    });
    document.getElementById("reset").addEventListener("click", resetMaze);
    autoToggleBtn.addEventListener("click", toggleAuto);
  </script>
</body>
</html>
